<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Estudio — Andrés Gaviria Arquitectura</title>
<meta name="description" content="Andrés Gaviria Arquitectura: estudio de autor en Medellín dedicado a la vivienda contemporánea y campestre en Antioquia.">
<link rel="icon" type="image/svg+xml" href="assets/img/logo/monograma.svg">
<link rel="icon" type="image/svg+xml" href="assets/img/logo/monograma.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/logo/favicon-32.png">
<link rel="apple-touch-icon" href="assets/img/logo/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Hanken+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--carbon:#181818;--grafito:#484848;--plata:#BEBEBE;--papel:#FCFCFC;--hairline:#E6E6E6;--hairline-dark:rgba(190,190,190,0.18);
    --font-display:'Jost',system-ui,sans-serif;--font-text:'Hanken Grotesk',system-ui,sans-serif;
    --mx:clamp(1.5rem,6vw,6rem);--section-y:clamp(4.5rem,11vh,8rem);--head-pad:1.5rem;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--papel);color:var(--carbon);font-family:var(--font-text);font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  img{display:block;}
  .eyebrow{font-family:var(--font-display);font-weight:400;text-transform:uppercase;letter-spacing:0.28em;font-size:0.68rem;color:var(--grafito);}
  .brand{display:inline-flex;align-items:center;}
  .logo-svg{height:auto;display:block;}

  #intro{position:fixed;inset:0;z-index:1000;pointer-events:none;overflow:hidden;animation:introFade 2.7s ease forwards;}
  #introCurtain{position:absolute;inset:0;background:var(--carbon);animation:curtainUp 2.7s cubic-bezier(.76,0,.24,1) forwards;}
  #introLogo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(1);animation:logoIntro 2.7s cubic-bezier(.76,0,.24,1) forwards;}
  #introLogo .logo-svg{width:min(78vw,690px);}
  @keyframes curtainUp{0%,32%{transform:translateY(0);}82%,100%{transform:translateY(-100%);}}
  @keyframes logoIntro{0%,32%{transform:translate(-50%,-50%) scale(1);}80%,100%{transform:translate(-50%,-50%) translate(-38vw,-40vh) scale(.40);}}
  @keyframes introFade{0%,82%{opacity:1;visibility:visible;}100%{opacity:0;visibility:hidden;}}
  body.intro-done #intro,body.intro-skip #intro{display:none;}

  .site-header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;background:var(--papel);color:var(--carbon);padding:var(--head-pad) var(--mx);border-bottom:1px solid transparent;transition:border-color .4s,padding .4s;}
  .site-header.is-scrolled{border-bottom:1px solid var(--hairline);padding-top:1.05rem;padding-bottom:1.05rem;}
  .site-header .logo-svg{width:clamp(216px,27vw,312px);}
  .header-right{display:flex;align-items:center;gap:clamp(1.2rem,2.6vw,2.6rem);}
  .nav{display:flex;gap:clamp(1.2rem,2.6vw,2.4rem);}
  .nav a{font-family:var(--font-display);font-weight:400;text-transform:uppercase;letter-spacing:0.2em;font-size:0.7rem;position:relative;padding-bottom:2px;}
  .nav a::after{content:"";position:absolute;left:0;bottom:0;height:1px;width:0;background:currentColor;transition:width .35s;}
  .nav a:hover::after,.nav a:focus-visible::after{width:100%;}
  .lang{display:flex;gap:.35rem;font-family:var(--font-display);font-size:0.7rem;letter-spacing:0.12em;}
  .lang button{background:none;border:none;cursor:pointer;color:var(--plata);font:inherit;padding:0;transition:color .25s;}
  .lang button[aria-pressed="true"]{color:var(--carbon);}
  .lang span{color:var(--plata);}
  .nav-toggle{display:none;}

  main{padding-top:calc(var(--head-pad)*2 + 2.4rem);}
  .projects{padding:var(--section-y) var(--mx) calc(var(--section-y)*.6);}
  .projects__head{display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;max-width:940px;margin:0 auto clamp(2rem,4vw,3.2rem);}
  .projects__title{font-family:var(--font-display);font-weight:300;font-size:clamp(1.8rem,3.2vw,2.6rem);letter-spacing:0.01em;}
  .projects__lead{font-family:var(--font-display);font-weight:300;font-size:clamp(1.1rem,1.7vw,1.45rem);line-height:1.5;max-width:32ch;color:var(--grafito);}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(1.4rem,2.4vw,2.4rem);max-width:940px;margin-left:auto;margin-right:auto;}
  @media (max-width:700px){.grid{grid-template-columns:repeat(2,1fr);gap:clamp(.9rem,3vw,1.4rem);}}
  .tile{display:block;position:relative;}
  .tile__frame{position:relative;aspect-ratio:1/1;background:var(--carbon);overflow:hidden;border-radius:14px;}
  .tile__placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--plata);font-family:var(--font-display);font-size:1.4rem;letter-spacing:0.14em;opacity:0.4;}
  .tile__frame img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .6s,filter .5s;}
  .tile__frame img.loaded{opacity:1;}
  .tile__overlay{position:absolute;inset:0;display:flex;align-items:flex-end;padding:0.9rem 1rem;color:var(--papel);pointer-events:none;background:linear-gradient(to top,rgba(24,24,24,0) 0%,rgba(24,24,24,0) 100%);transition:background .4s;}
  .tile__name{font-family:var(--font-display);font-weight:400;font-size:clamp(0.9rem,1.35vw,1.25rem);letter-spacing:0.02em;white-space:nowrap;transform:translateY(.4rem);opacity:0;transition:opacity .4s,transform .4s;}
  @media (max-width:700px){.tile__name{font-size:0.86rem;}}
  @media (max-width:420px){.tile__name{font-size:0.78rem;}}
  @media (hover:hover){
    .tile:hover .tile__frame img.loaded{filter:grayscale(1);}
    .tile:hover .tile__overlay,.tile:focus-visible .tile__overlay{background:linear-gradient(to top,rgba(24,24,24,0.58) 0%,rgba(24,24,24,0.12) 55%,rgba(24,24,24,0.04) 100%);}
    .tile:hover .tile__name,.tile:focus-visible .tile__name{opacity:1;transform:none;}
  }
  @media (hover:none){
    .tile__overlay{background:linear-gradient(to top,rgba(24,24,24,0.5) 0%,rgba(24,24,24,0.06) 48%,rgba(24,24,24,0) 72%);}
    .tile__name{opacity:1;transform:none;}
    .tile:active .tile__frame img.loaded{filter:grayscale(1);transition:filter .12s ease;}
    .tile:active .tile__overlay{background:linear-gradient(to top,rgba(24,24,24,0.62) 0%,rgba(24,24,24,0.14) 60%,rgba(24,24,24,0.02) 100%);}
  }
  /* efecto de crecimiento sutil ligado al scroll (como BIG) */
  @keyframes tileZoom{from{transform:scale(1);}to{transform:scale(1.06);}}
  @supports (animation-timeline:view()){
    @media (prefers-reduced-motion:no-preference){
      .tile__frame img{animation:tileZoom linear both;animation-timeline:view();animation-range:cover;}
    }
  }

  .studio{padding:var(--section-y) var(--mx);border-top:1px solid var(--hairline);}
  .studio__head{margin-bottom:clamp(1.8rem,3.5vw,2.8rem);}
  .studio__head .logo-svg{width:clamp(260px,34vw,400px);}
  .studio__grid{display:grid;grid-template-columns:1fr 1.2fr;gap:clamp(2rem,6vw,6rem);align-items:center;}
  @media (max-width:760px){.studio__grid{grid-template-columns:1fr;}}
  .studio__statement{font-family:var(--font-display);font-weight:300;font-size:clamp(1.4rem,2.4vw,2rem);line-height:1.35;}
  .studio__body{color:var(--grafito);max-width:56ch;}
  .studio__body p+p{margin-top:1.1rem;}

  .journal{padding:var(--section-y) var(--mx);border-top:1px solid var(--hairline);}
  .journal__title{font-family:var(--font-display);font-weight:300;font-size:clamp(1.7rem,3vw,2.4rem);margin:.4rem 0 1rem;}
  .journal__empty{color:var(--grafito);max-width:48ch;}

  .site-footer{background:var(--carbon);color:var(--papel);padding:var(--section-y) var(--mx) 2.4rem;}
  .site-footer .logo-svg{width:clamp(240px,28vw,324px);}
  .footer__top{display:flex;justify-content:space-between;gap:3rem;flex-wrap:wrap;padding-bottom:clamp(2.2rem,4vw,3.4rem);border-bottom:1px solid var(--hairline-dark);}
  .footer__contact{display:flex;gap:clamp(1.8rem,4vw,4rem);flex-wrap:wrap;}
  .footer__col .eyebrow{color:var(--plata);display:block;margin-bottom:0.6rem;}
  .footer__col a,.footer__col span{font-size:0.9rem;letter-spacing:0.02em;}
  .footer__col a:hover{color:var(--plata);}
  .socials{display:flex;align-items:center;gap:1rem;margin-top:clamp(2rem,4vw,3rem);flex-wrap:wrap;}
  .socials a{display:inline-flex;width:22px;height:22px;color:var(--plata);transition:color .25s,transform .25s;}
  .socials a:hover{color:var(--papel);transform:translateY(-2px);}
  .socials svg{width:100%;height:100%;}
  .footer__bottom{display:flex;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;margin-top:2rem;font-family:var(--font-display);font-size:0.64rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--plata);}

  .wa{position:fixed;right:clamp(1rem,3vw,2rem);bottom:clamp(1rem,3vw,2rem);z-index:200;width:52px;height:52px;border-radius:50%;background:var(--carbon);color:var(--papel);display:inline-flex;align-items:center;justify-content:center;box-shadow:0 6px 22px rgba(24,24,24,0.25);transition:transform .25s,background .25s;}
  .wa:hover{transform:translateY(-3px);background:var(--grafito);}
  .wa svg{width:26px;height:26px;}
  :focus-visible{outline:1px solid currentColor;outline-offset:4px;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important;}#intro{display:none;}.tile__name{opacity:1;transform:none;}}
  @media (max-width:680px){
    .nav{display:none;}
    .nav.open{display:flex;position:absolute;top:100%;right:0;left:0;flex-direction:column;gap:1.1rem;background:var(--papel);border-bottom:1px solid var(--hairline);padding:1.4rem var(--mx);}
    .nav-toggle{display:inline-flex;background:none;border:none;cursor:pointer;font-family:var(--font-display);font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--carbon);}
  }
</style>
<style>
  .page{padding:clamp(7.5rem,14vw,10rem) var(--mx) var(--section-y);max-width:1080px;margin:0 auto;}
  .back{font-family:var(--font-display);text-transform:uppercase;letter-spacing:0.2em;font-size:0.7rem;color:var(--grafito);display:inline-block;margin-bottom:clamp(1rem,2.4vw,1.6rem);transition:color .25s;}
  .back:hover{color:var(--carbon);}
  .page__title{font-family:var(--font-display);font-weight:300;font-size:clamp(2.4rem,6vw,4rem);letter-spacing:0.01em;margin:0 0 clamp(1.6rem,4vw,2.6rem);}
  .page__lead{font-family:var(--font-display);font-weight:300;font-size:clamp(1.3rem,2.6vw,1.9rem);line-height:1.35;color:var(--carbon);max-width:30ch;margin-bottom:clamp(1.8rem,4vw,2.8rem);}
  .prose p{max-width:62ch;color:var(--grafito);margin-bottom:1.1rem;line-height:1.75;}
  /* Estudio: retrato + biografía */
  .about-grid{display:grid;grid-template-columns:0.9fr 1.1fr;gap:clamp(2rem,5vw,4rem);align-items:start;margin-top:clamp(2.6rem,6vw,4rem);}
  @media(max-width:760px){.about-grid{grid-template-columns:1fr;gap:clamp(1.6rem,5vw,2.4rem);}}
  .portrait-frame{border-radius:16px;overflow:hidden;background:var(--hairline);}
  .portrait-frame img{display:block;width:100%;height:auto;}
  .bio__name{font-family:var(--font-display);text-transform:uppercase;letter-spacing:0.16em;font-size:0.82rem;color:var(--carbon);margin-bottom:1rem;}
  /* Bitácora */
  .articles{display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(1.2rem,2.4vw,2rem);margin-top:clamp(2rem,4vw,3rem);}
  @media(max-width:700px){.articles{grid-template-columns:1fr;}}
  .article{display:flex;flex-direction:column;border:1px solid var(--hairline);border-radius:14px;background:var(--papel);overflow:hidden;transition:border-color .3s,transform .3s;}
  .article:hover{border-color:var(--grafito);transform:translateY(-3px);}
  .article__media{display:block;aspect-ratio:16/9;overflow:hidden;background:var(--hairline);}
  .article__media img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s;}
  .article:hover .article__media img{transform:scale(1.03);}
  .article__media.no-img{display:none;}
  .article__body{display:flex;flex-direction:column;gap:1rem;padding:clamp(1.3rem,2.4vw,1.8rem);flex:1;}
  .article__tag{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.14em;font-size:.62rem;color:var(--plata);}
  .article__title{font-family:var(--font-display);font-weight:400;font-size:clamp(1.08rem,1.6vw,1.34rem);line-height:1.32;color:var(--carbon);flex:1;}
  .article__link{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.12em;font-size:.66rem;color:var(--carbon);align-self:flex-start;border-bottom:1px solid var(--carbon);padding-bottom:2px;transition:opacity .25s;}
  .article__link:hover{opacity:.6;}
  /* Contacto */
  .contact-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:clamp(2rem,5vw,4rem);margin-top:clamp(1.6rem,4vw,2.6rem);align-items:start;}
  @media(max-width:760px){.contact-grid{grid-template-columns:1fr;}}
  .contact-block{margin-bottom:1.7rem;}
  .contact-block .eyebrow{display:block;color:var(--plata);font-family:var(--font-display);text-transform:uppercase;letter-spacing:.16em;font-size:.66rem;margin-bottom:.4rem;}
  .contact-block a{border-bottom:1px solid transparent;transition:border-color .25s;}
  .contact-block a:hover{border-color:var(--carbon);}
  .field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.1rem;}
  .field label{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.12em;font-size:.64rem;color:var(--grafito);}
  .field input,.field textarea{font:inherit;color:var(--carbon);background:var(--papel);border:1px solid var(--hairline);border-radius:10px;padding:.8rem .9rem;transition:border-color .25s;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--carbon);}
  .field textarea{min-height:150px;resize:vertical;}
  .form button{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.14em;font-size:.72rem;background:var(--carbon);color:var(--papel);border:none;border-radius:10px;padding:.95rem 1.7rem;cursor:pointer;transition:background .25s;}
  .form button:hover{background:var(--grafito);}
</style>
</head>

<script>
  var I18N={es:{"nav.projects": "Proyectos", "nav.studio": "Estudio", "nav.journal": "Bitácora", "nav.contact": "Contacto", "footer.web": "Web", "footer.email": "Correo", "footer.phone": "Teléfono", "back": "← Proyectos", "est.title": "Estudio", "est.lead": "El lujo sereno de habitar.", "est.p1": "Andrés Gaviria Arquitectura es un estudio de autor con sede en Medellín, dedicado a la vivienda contemporánea en Colombia. Su trabajo se concentra en la casa unifamiliar y en la vivienda campestre del Oriente antioqueño (Llanogrande, El Retiro, La Ceja, Rionegro, entre otros) y se extiende a planes parciales y proyectos urbanos. Cada encargo se entiende como una respuesta precisa a su lugar: la pendiente, la luz, los árboles, el clima.", "est.p2": "El estudio practica una arquitectura de líneas precisas, materiales honestos y luz natural, donde el silencio y la proporción importan tanto como el confort. La materialidad (ladrillo, piedra, madera y concreto a la vista) se emplea con sobriedad, buscando casas que envejezcan bien y que sostengan, en el tiempo, el lujo sereno de habitar.", "est.p3": "De la mano de constructoras y promotores aliados, el estudio acompaña cada proyecto según el encargo: desde el diseño arquitectónico y urbano hasta la dirección y la construcción de la obra.", "est.bioName": "Andrés Gaviria", "est.bio1": "Andrés Gaviria es arquitecto y urbanista, con más de quince años de ejercicio profesional dedicados a la vivienda de autor en Colombia. A lo largo de su trayectoria ha proyectado y dirigido casas unifamiliares, viviendas campestres, edificios y planes parciales, principalmente en el Oriente antioqueño y el Valle de Aburrá, consolidando un lenguaje propio de sobriedad, precisión y arraigo al lugar.", "est.bio2": "Es profesor universitario e investigador. Su trabajo académico, hoy en el marco de estudios doctorales, explora la inteligencia artificial y los procesos de morfogénesis en la arquitectura contemporánea, una mirada que enriquece su práctica proyectual y su manera de entender la relación entre la forma, la técnica y el territorio.", "est.bio3": "Dirige personalmente cada encargo, del primer trazo a la obra, con la convicción de que una casa bien hecha es aquella que sostiene, con el tiempo, el lujo sereno de habitar."},en:{"nav.projects": "Works", "nav.studio": "Studio", "nav.journal": "Journal", "nav.contact": "Contact", "footer.web": "Web", "footer.email": "Email", "footer.phone": "Phone", "back": "← Works", "est.title": "Studio", "est.lead": "The serene luxury of dwelling.", "est.p1": "Andrés Gaviria Arquitectura is an authorial studio based in Medellín, devoted to contemporary dwelling in Colombia. Its work centres on the single-family house and the country home of eastern Antioquia (Llanogrande, El Retiro, La Ceja, Rionegro, among others) and extends to master plans and urban projects. Each commission is understood as a precise response to its place: the slope, the light, the trees, the climate.", "est.p2": "The studio practises an architecture of precise lines, honest materials and natural light, where silence and proportion matter as much as comfort. Materiality (brick, stone, timber and exposed concrete) is used with restraint, seeking houses that age well and sustain, over time, the serene luxury of dwelling.", "est.p3": "Working alongside allied builders and developers, the studio sees each project through according to the commission: from architectural and urban design to project direction and construction.", "est.bioName": "Andrés Gaviria", "est.bio1": "Andrés Gaviria is an architect and urban planner with more than fifteen years of professional practice devoted to authorial housing in Colombia. Over his career he has designed and directed single-family houses, country homes, buildings and master plans, mainly in eastern Antioquia and the Aburrá Valley, shaping a personal language of restraint, precision and attachment to place.", "est.bio2": "He is a university professor and researcher. His academic work, currently within doctoral studies, explores artificial intelligence and morphogenetic processes in contemporary architecture, a perspective that enriches his design practice and his understanding of the relationship between form, technique and territory.", "est.bio3": "He personally leads each commission, from the first line to the finished work, convinced that a well-made house is one that sustains, over time, the serene luxury of dwelling."}};
